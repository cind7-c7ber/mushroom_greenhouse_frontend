  <!-- Roof peak -->
  <path d="M2 15 L16 4 L30 15" stroke="#9A75B0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Door -->
  <rect x="13" y="20" width="6" height="8" rx="1" fill="#9A75B0" opacity="0.4"/>
