  <!-- Window pane right -->
  <rect x="21" y="16" width="5" height="4" rx="0.5" fill="#4FA99A" opacity="0.5"/>
  <!-- Mushroom cap (small, inside) -->
  <ellipse cx="16" cy="17" rx="3.5" ry="2" fill="#C4A8DA" opacity="0.8"/>
  <path d="M14 17 Q14 20 16 20 Q18 20 18 17" fill="#E5EFF0" opacity="0.5"/>
